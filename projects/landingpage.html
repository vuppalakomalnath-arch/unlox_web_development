<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/c64ab44a01.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="landing.css"/>
</head>
<body>
    <div class="landing-page">
        <div class="developer-section">
            <p class="content">Home</p>
            <p class="content">About</p>
            <p class="content">Journey</p>
            <p class="content">Projects</p>
            <p class="content">Contact</p>
        </div>
        <div class="details">
            <p class="welcome">Welcome to my portfolio</p>
            <h1 class="greetings">Hi, I'm <span class="name">Komalnath Vuppala</span></h1>
            <p class="occupation">Full Stack Developer</p>
            <p class="description">I'm always eager to learn new technologies and take on exciting challenges.<br> Let's build something amazing together.</p>
            <div class="btns">
                <button class="btn">View My Work ⬇ </button>
                <button class="button">Get in Touch</button>
            </div>
            <div class="icons">
                <i class="fa-brands fa-github icon"></i>
                <i class="fa-brands fa-linkedin-in icon"></i>
                <i class="fa-regular fa-envelope icon"></i>
            </div>
            <i class="fa-solid fa-arrow-down"></i>
        </div>
    </div>
</body>
</html>
